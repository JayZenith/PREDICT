# Arm A: reactive agent GRPO over 212 disjoint MBPP RL train tasks.
max_steps = 150
seq_len = 4096
output_dir = "outputs/arm_a_rl"

[model]
name = "JayZenith/SFT_ARM_A"

[tokenizer]
chat_template = "configs/chat_template.jinja"
eos_token = "<|im_end|>"

[wandb]
project = "predict-mbpp"
group = "matched-arms"
name = "arm-a-grpo"

[orchestrator]
batch_size = 64
group_size = 16

[orchestrator.algo]
type = "grpo"

[orchestrator.renderer]
name = "default"

[orchestrator.train.sampling]
temperature = 0.8
max_completion_tokens = 512
extra_body = { stop_token_ids = [151645], top_k = 20 }

[[orchestrator.train.env]]
name = "arm-a-train"
taskset = { id = "glyph", data_path = "data/arm_a_train.jsonl", task = { max_trace_tokens = 4096 } }
harness = { id = "glyph", arm = "a", runtime = { type = "subprocess" }, max_tool_calls = 8, tool_timeout = 30 }
pool = { type = "elastic", max_workers = 16, multiplex = 4 }

[[orchestrator.post_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.eval]
interval = 50
num_examples = 40
group_size = 1

[orchestrator.eval.sampling]
temperature = 0.0
max_completion_tokens = 512
extra_body = { stop_token_ids = [151645] }

[[orchestrator.eval.env]]
name = "arm-a-validation"
taskset = { id = "glyph", data_path = "data/arm_a_validation.jsonl", task = { max_trace_tokens = 4096 } }
harness = { id = "glyph", arm = "a", runtime = { type = "subprocess" }, max_tool_calls = 8, tool_timeout = 30 }
pool = { type = "elastic", max_workers = 16, multiplex = 4 }

[trainer.loss]
type = "default"
kl_tau = 0.0

[trainer.optim]
lr = 1e-6
weight_decay = 0.01

[ckpt]
interval = 50
keep_last = 3

[orchestrator.ckpt]
wait_for_weights_timeout = 60

[trainer.ckpt]
weights_only = true

[inference]
gpu_memory_utilization = 0.85
seed = 42

[weight_broadcast]
type = "filesystem"

[deployment]
type = "single_node"
num_train_gpus = 1
num_infer_gpus = 1
gpus_per_node = 2
