# Arm B: matched GRPO plus verified-label prediction CE.
max_steps = 94
seq_len = 4096
output_dir = "outputs/arm_b_rl"

[model]
name = "outputs/arm_b_sft/weights/step_24"

[tokenizer]
chat_template = "configs/chat_template.jinja"

[wandb]
project = "predict-mbpp"
group = "matched-arms"
name = "arm-b-predict"

[orchestrator]
batch_size = 32
group_size = 8

[orchestrator.algo]
type = "predict"
alpha = 0.1
max_aux_tokens = 4096

[orchestrator.renderer]
name = "default"

[orchestrator.train.sampling]
temperature = 0.8
max_completion_tokens = 512

[[orchestrator.train.env]]
name = "arm-b-train"
taskset = { id = "glyph", data_path = "data/arm_b_train.jsonl", task = { max_trace_tokens = 4096 } }
harness = { id = "glyph", arm = "b", runtime = { type = "prime", image = "python:3.12-slim-bookworm", workdir = "/workspace", network_access = true, cpu = 1.0, memory = 2.0, disk = 2.0, idle_timeout = 600, labels = ["predict", "arm-b", "mbpp", "train"] }, max_tool_calls = 8, tool_timeout = 30 }
pool = { type = "elastic", max_workers = 16, multiplex = 4 }

[[orchestrator.post_batch_filters]]
type = "zero_advantage"
enforce = false

[orchestrator.eval]
interval = 24
num_examples = 90
group_size = 1

[orchestrator.eval.sampling]
temperature = 0.0
max_completion_tokens = 512

[[orchestrator.eval.env]]
name = "arm-b-validation"
taskset = { id = "glyph", data_path = "data/arm_b_validation.jsonl", task = { max_trace_tokens = 4096 } }
harness = { id = "glyph", arm = "b", runtime = { type = "prime", image = "python:3.12-slim-bookworm", workdir = "/workspace", network_access = true, cpu = 1.0, memory = 2.0, disk = 2.0, idle_timeout = 600, labels = ["predict", "arm-b", "mbpp", "validation"] }, max_tool_calls = 8, tool_timeout = 30 }
pool = { type = "elastic", max_workers = 16, multiplex = 4 }

[trainer.loss]
type = "default"
kl_tau = 0.0

[trainer.optim]
lr = 1e-6
weight_decay = 0.01

[ckpt]
interval = 24
keep_last = 2

[inference]
gpu_memory_utilization = 0.85
seed = 42

[deployment]
type = "single_node"
num_train_gpus = 1
num_infer_gpus = 1
gpus_per_node = 2
