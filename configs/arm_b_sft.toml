# Arm B: roughly four matched full-parameter SFT epochs.
max_steps = 48
output_dir = "outputs/arm_b_sft"
eos_token_loss_weight = 8.0

[wandb]
project = "predict-mbpp"
group = "matched-sft"
name = "arm-b-sft"

[model]
name = "Qwen/Qwen3-4B-Base"
impl = "auto"
seq_len = 768

[tokenizer]
chat_template = "configs/chat_template.jinja"
eos_token = "<|im_end|>"

[data]
type = "sft"
name = "data/sft/arm_b"
batch_size = 32
micro_batch_size = 1
seq_len = 768
pack_function = "stack"
shuffle = true
seed = 42

[data.loss_mask]
system = false
user = false
assistant = true
tool = false

[optim]
type = "adamw"
lr = 2e-5
weight_decay = 0.01

[scheduler]
type = "linear"
warmup_steps = 2
decay_steps = 46
min_lr = 0.0

[ckpt]
interval = 48
keep_last = 1

[deployment]
type = "single_node"
num_gpus = 1
gpus_per_node = 1
