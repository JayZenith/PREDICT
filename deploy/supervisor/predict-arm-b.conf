[program:predict-arm-b]
command=/workspace/PREDICT/scripts/train_rl_instance.sh b
directory=/workspace/PREDICT
autostart=false
autorestart=unexpected
startsecs=30
stopasgroup=true
killasgroup=true
stopsignal=TERM
environment=CUDA_VISIBLE_DEVICES="2,3",HF_HOME="/workspace/.hf_home",WANDB_MODE="offline",PYTHONUNBUFFERED="1"
stdout_logfile=/workspace/PREDICT/outputs/arm_b_rl/supervisor.log
stdout_logfile_maxbytes=0
redirect_stderr=true
